[Settings]
; =========================
; 全局功能开关 / Global Switches
; =========================

# 模板文件路径（你的自定义模板）
source_file = config/user_demo.txt
# 生成结果文件路径
final_file = output/user_result.txt

# 开启更新
open_update = True
# 开启未匹配频道分类
open_unmatch_category = False
# 开启无结果频道分类
open_empty_category = False
# 验证时间写入 validation.json，不在频道列表中制造伪频道
open_update_time = False
# 关闭接口附加说明，避免部分播放器无法解析 URL 后的扩展信息
open_url_info = False
# 开启 EPG 功能
open_epg = True
# 开启转换生成 m3u 文件
open_m3u_result = True

# 单个频道最多保留 3 条已验证线路，减少失效线路和列表体积
urls_limit = 3
# 更新时间显示位置
update_time_position = top
# 系统语言设置
language = zh_CN


; =========================
; 定时执行设置 / Scheduled Execution Settings
; =========================

# 定时执行更新时间模式
update_mode = interval
# 定时执行更新时间间隔（小时）
update_interval = 6
# 定时执行更新时间点
update_times =
# 启动时执行更新
update_startup = True
# 时区
time_zone = Asia/Shanghai


; =========================
; 结果输出 & 服务配置 / Output & Service
; =========================

# 开启实时写入结果文件
open_realtime_write = True
# 开启页面服务
open_service = True
# 页面服务端口（注意：默认从8000改为5180）
app_port = 5180
# 公网协议
public_scheme = http
# 公网 Host 地址（原 app_host）
public_domain = 127.0.0.1
# CDN 代理加速地址
cdn_url = https://gh-proxy.com
# HTTP 代理地址
http_proxy =


; =========================
; 数据源总开关 / Source Global Switches
; =========================

# ⚠️ 重要变更：以下源类型已在上游 v2.0.x 中移除
# - hotel（酒店源）❌ 已移除
# - multicast（组播源在线查询）❌ 已移除
# - online_search（在线搜索）❌ 已移除
# - driver（浏览器驱动）❌ 已移除

# 仅启用 config/local/public_verified.txt 中的公网候选源
open_local = True
# 开启订阅源功能（保留）
open_subscribe = True
# 公共订阅偶发超时不应被永久写回停用
open_auto_disable_source = False


; =========================
; 数据源工作模式 / Source Working Modes
; =========================

# 禁止旧 RTP 和已失效历史地址重新混入新结果
open_history = False
# 开启使用 M3U 内含的请求头验证信息
open_headers = True


; =========================
; 过滤 & 测速设置 / Filtering & Speed Test
; =========================
; ⚠️ 优化说明：GitHub Actions 在海外服务器运行测速
; 对中国国内源延迟偏高，需降低阈值避免误过滤优质源

# 候选源统一交给发布前 ffprobe 媒体包验证，避免瞬时速率误判
open_speed_test = False
# 最终验证脚本会要求存在视频流并实际读到视频包
open_filter_resolution = False
# 不使用瞬时下载速率作为可播放性的唯一判断
open_filter_speed = False
# 开启全量测速（False = 达到 urls_limit 后停止测速，节省时间）
open_full_speed_test = False
# 不用低于过滤条件的地址补足数量，质量优先
open_supply = False

# 接口最小分辨率（降低要求，允许更多源通过）
min_resolution = 720x480
# 接口最大分辨率
max_resolution = 3840x2160
# 接口最小速率（降低阈值，适配海外测速环境）
min_speed = 0.3
# 分辨率与速率映射关系（更宽松的映射）
resolution_speed_map = 720x480:0.1,1280x720:0.2,1920x1080:0.3,3840x2160:0.5

# 同时执行测速的接口数量（增加并发）
speed_test_limit = 10
# 单个接口测速超时时长（增加超时，给慢网络更多时间）
speed_test_timeout = 15
# 每条 URL 独立验证，避免同 Host 的失效路径复用成功结果
speed_test_filter_host = False
# 查询请求超时时长（秒）
request_timeout = 20


; =========================
; 网络协议 & 地域偏好 / Network & Region Preferences
; =========================

# 不强制 GitHub Runner 具备 IPv6
ipv6_support = False
# 优先发布兼容性更好的 IPv4 地址
ipv_type = ipv4
# 接口协议类型偏好
ipv_type_prefer = ipv4
# 接口归属地
location =
# 接口运营商
isp =


; =========================
; 结果排序偏好 / Result Ordering Preference
; =========================

# 结果偏好的接口来源（原 origin_type_prefer 中已移除的 hotel 和 multicast 不再有效）
# 仅支持: local, subscribe
origin_type_prefer = local,subscribe


; =========================
; 本地源 / Local Source
; =========================

# 结果中偏好的本地源接口数量
local_num = 5


; =========================
; 订阅源 / Subscription Source
; =========================

# 结果中偏好的订阅源接口数量
subscribe_num = 15


; =========================
; 频道台标 / Channel Logo
; =========================

# 频道台标库地址
logo_url = https://live.fanmingming.cn/tv
# 频道台标文件类型
logo_type = png


; =========================
; RTMP 推流 / RTMP Push
; =========================

# ⚠️ 新增功能：RTMP 推流
# 开启 RTMP 推流功能，需要安装 FFmpeg
open_rtmp = False
# Nginx HTTP 服务端口
nginx_http_port = 8080
# Nginx RTMP 服务端口
nginx_rtmp_port = 1935
# RTMP 频道接口空闲停止推流超时时长（秒）
rtmp_idle_timeout = 300
# RTMP 推流最大并发数量
rtmp_max_streams = 10
# 推流转码模式
rtmp_transcode_mode = copy


; =========================
; ⚠️ 已废弃参数说明（以下参数在上游 v2.0.x 中已移除，配置无效）
; =========================
; open_driver = False        ❌ 驱动模式已移除
; open_hotel = True          ❌ 酒店源已移除
; open_hotel_foodie = True   ❌ 酒店源已移除
; open_hotel_fofa = False    ❌ 酒店源已移除
; open_multicast = True      ❌ 在线组播源查询已移除
; open_multicast_foodie      ❌ 已移除
; open_multicast_fofa        ❌ 已移除
; open_online_search = False ❌ 在线搜索已移除
; open_request = False       ❌ 已移除
; open_use_cache = True      ❌ 已移除
; hotel_num = 15             ❌ 已移除
; hotel_page_num = 2         ❌ 已移除
; hotel_region_list = 全部   ❌ 已移除
; multicast_num = 15         ❌ 已移除
; multicast_page_num = 2     ❌ 已移除
; multicast_region_list      ❌ 已移除
; online_search_num = 0      ❌ 已移除
; online_search_page_num     ❌ 已移除
; app_host = http://...      ❌ 改用 public_domain
; recent_days = 15           ❌ 已移除

; =========================
; 📝 你的 RTP 组播源配置说明
; =========================
; 你的 config/rtp/ 目录下的 44 个 RTP 配置文件仍然有效！
; 这些是本地文件，通过 open_local = True 加载
; 与上游移除的"在线组播源查询"功能不同
; 你可以继续使用 RTP 转 M3U 工作流
